<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор группы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        .auth-box, .app-box {
            padding: 48px 32px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 16px;
            color: #1a1a2e;
        }

        .google-btn {
            background: white;
            color: #444;
            border: 2px solid #e0e0e0;
            padding: 14px 32px;
            border-radius: 48px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .google-btn:hover {
            background: #f8f9fa;
            border-color: #4285f4;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px 28px 0 28px;
        }

        .status-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 16px 0;
            padding: 0 28px;
        }

        .status-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .btn-study { background: #e9f3fa; color: #1e6f9f; }
        .btn-coffee { background: #f7efe3; color: #b45f2b; }
        .btn-game { background: #ede7f6; color: #6b3fa0; }
        .btn-home { background: #e6f4ea; color: #2c6e3c; }

        .group-section {
            padding: 16px 28px 28px;
        }

        .group-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 460px;
            overflow-y: auto;
        }

        .user-item {
            background: #f8fafc;
            border-radius: 28px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 14px;
        }

        .user-name {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .user-status-text {
            font-size: 0.8rem;
            color: #5c6f87;
            background: white;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 6px;
        }

        .my-info {
            background: #f8fafd;
            padding: 12px 18px;
            margin: 0 28px 20px 28px;
            border-radius: 28px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            margin: 20px;
            border-radius: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="root" class="container">
        <div class="loading">Загрузка...</div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // Конфигурация Supabase
           const URL = 'https://hnkltaebpyqsasljixkg.supabase.co';
    // Внимание: используем реальный publishable ключ из условия (он не секретный для клиента)
    const KEY = 'sb_publishable_ZpJ8sXBpfHiel-ymO1rE3A_NTt2Wp-G';
    const supabase = createClient(URL, KEY);

        // Функция для получения цвета статуса
        function getStatusColor(status) {
            if (!status) return '#9ca3af';
            if (status === 'Учёба') return '#3b82f6';
            if (status === 'Кофе-брейк') return '#d97706';
            if (status === 'В игре') return '#8b5cf6';
            if (status === 'Дома') return '#2ecc71';
            return '#9ca3af';
        }

        // Получить текущий полный URL (без hash)
        function getCurrentUrl() {
            return window.location.origin + window.location.pathname;
        }

        // Страница входа
        function renderLogin() {
            const root = document.getElementById('root');
            root.innerHTML = `
                <div class="auth-box">
                    <h1>👋 Монитор группы</h1>
                    <p style="color: #666; margin-bottom: 20px;">Войдите через Google чтобы продолжить</p>
                    <button class="google-btn" id="loginBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Войти через Google
                    </button>
                    <p style="margin-top: 24px; font-size: 12px; color: #999;">
                        🔐 Вы вернетесь на: ${getCurrentUrl()}
                    </p>
                </div>
            `;
            
            document.getElementById('loginBtn').onclick = async () => {
                try {
                    const { error } = await supabase.auth.signInWithOAuth({
                        provider: 'google',
                        options: {
                            redirectTo: getCurrentUrl()
                        }
                    });
                    if (error) throw error;
                } catch (err) {
                    alert('Ошибка: ' + err.message);
                }
            };
        }

        // Основное приложение
        function renderApp(user) {
            const root = document.getElementById('root');
            root.innerHTML = `
                <div class="profile-header">
                    <h2>👤 Мой профиль</h2>
                    <button class="logout-btn" id="logoutBtn">Выйти</button>
                </div>
                <div class="my-info" id="myInfo">Загрузка...</div>
                <div class="status-grid">
                    <button class="status-btn btn-study" data-status="Учёба">📚 Учёба</button>
                    <button class="status-btn btn-coffee" data-status="Кофе-брейк">☕ Кофе</button>
                    <button class="status-btn btn-game" data-status="В игре">🎮 В игре</button>
                    <button class="status-btn btn-home" data-status="Дома">🏠 Дома</button>
                </div>
                <div class="group-section">
                    <div class="group-title">
                        📡 Монитор группы
                        <span id="memberCount" style="font-size: 0.9rem; background: #eef2ff; padding: 2px 12px; border-radius: 20px; margin-left: 10px;">0</span>
                    </div>
                    <div id="userList" class="user-list">
                        <div class="loading">Загрузка...</div>
                    </div>
                </div>
            `;
            
            // Кнопка выхода
            document.getElementById('logoutBtn').onclick = async () => {
                await supabase.auth.signOut();
                window.location.reload();
            };
            
            // Кнопки статусов
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.onclick = async () => {
                    const status = btn.getAttribute('data-status');
                    await supabase
                        .from('profiles')
                        .update({ status: status })
                        .eq('id', user.id);
                    loadUsers(user.id);
                };
            });
            
            loadUsers(user.id);
            setInterval(() => loadUsers(user.id), 5000);
        }

        // Загрузка списка пользователей
        async function loadUsers(currentUserId) {
            const { data: users, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username');
            
            if (error) {
                console.error('Ошибка:', error);
                return;
            }
            
            // Обновляем информацию о себе
            const me = users.find(u => u.id === currentUserId);
            const myInfoDiv = document.getElementById('myInfo');
            if (myInfoDiv && me) {
                myInfoDiv.innerHTML = `✅ <strong>${escapeHtml(me.username)}</strong> · текущий статус: <span style="background: #eef2ff; padding: 2px 10px; border-radius: 20px;">${escapeHtml(me.status || 'не задан')}</span>`;
            }
            
            // Обновляем список
            const listDiv = document.getElementById('userList');
            if (listDiv) {
                if (!users || users.length === 0) {
                    listDiv.innerHTML = '<div class="loading">👥 Пока нет участников</div>';
                } else {
                    listDiv.innerHTML = users.map(user => {
                        const color = getStatusColor(user.status);
                        const statusText = user.status || 'Статус не задан';
                        const isMe = user.id === currentUserId;
                        
                        return `
                            <div class="user-item">
                                <div class="status-dot" style="background: ${color}; width: 14px; height: 14px; border-radius: 14px;"></div>
                                <div class="user-info">
                                    <div class="user-name">
                                        ${escapeHtml(user.username)}
                                        ${isMe ? ' <span style="font-size: 0.7rem; background: #e2f0ff; padding: 2px 8px; border-radius: 40px;">вы</span>' : ''}
                                    </div>
                                    <div class="user-status-text">${escapeHtml(statusText)}</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
                document.getElementById('memberCount').innerText = `${users.length} уч.`;
            }
        }

        // Создание профиля если нет
        async function createProfileIfNeeded(user) {
            const { data: existing } = await supabase
                .from('profiles')
                .select('id')
                .eq('id', user.id)
                .maybeSingle();
            
            if (!existing) {
                const username = user.user_metadata?.full_name || 
                                user.user_metadata?.name ||
                                user.email.split('@')[0];
                
                await supabase.from('profiles').insert({
                    id: user.id,
                    username: username,
                    status: 'Присоединился',
                    email: user.email
                });
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, (m) => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Обработка возврата от Google (токены в URL)
        async function handleOAuthRedirect() {
            const hash = window.location.hash;
            if (hash && hash.includes('access_token')) {
                const params = new URLSearchParams(hash.substring(1));
                const access_token = params.get('access_token');
                const refresh_token = params.get('refresh_token');
                
                if (access_token && refresh_token) {
                    await supabase.auth.setSession({ access_token, refresh_token });
                    window.history.replaceState({}, document.title, window.location.pathname);
                    return true;
                }
            }
            return false;
        }

        // Главная функция
        async function init() {
            // Обрабатываем редирект от Google
            await handleOAuthRedirect();
            
            // Проверяем сессию
            const { data: { session } } = await supabase.auth.getSession();
            
            if (session) {
                await createProfileIfNeeded(session.user);
                renderApp(session.user);
            } else {
                renderLogin();
            }
        }
        
        init();
    </script>
</body>
</html>
