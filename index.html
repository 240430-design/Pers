<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор группы — Учебная комната</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Основной контейнер - как в Telegram/мессенджере */
        .app-container {
            max-width: 1400px;
            width: 100%;
            height: 90vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            overflow: hidden;
        }

        /* Левая панель - Монитор группы */
        .sidebar {
            width: 320px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
        }

        .sidebar-header h2 {
            font-size: 1.3rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online-count {
            font-size: 0.8rem;
            background: #22c55e;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
        }

        /* Список участников */
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .user-card {
            background: white;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        .user-card.online {
            border-left: 4px solid #22c55e;
            background: #fefce8;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 2px white;
        }

        .offline-dot {
            width: 10px;
            height: 10px;
            background: #94a3b8;
            border-radius: 50%;
            display: inline-block;
        }

        .user-status {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }

        .study-timer {
            font-size: 0.8rem;
            font-weight: 600;
            background: #e0f2fe;
            padding: 2px 8px;
            border-radius: 20px;
            color: #0284c7;
        }

        .break-btn {
            background: #fef08a;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        /* Правая панель - Чат */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            color: #1e293b;
        }

        .my-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .status-buttons {
            display: flex;
            gap: 8px;
        }

        .status-badge {
            background: #f1f5f9;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }

        .status-badge:hover {
            background: #e2e8f0;
        }

        .status-badge.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        /* Сообщения чата */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafcff;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }

        .message.my-message {
            align-self: flex-end;
        }

        .message-other {
            align-self: flex-start;
        }

        .message-sender {
            font-size: 0.75rem;
            font-weight: 600;
            color: #3b82f6;
            margin-bottom: 4px;
            padding-left: 12px;
        }

        .message-bubble {
            background: white;
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            word-wrap: break-word;
            font-size: 0.95rem;
        }

        .my-message .message-bubble {
            background: #3b82f6;
            color: white;
            border: none;
        }

        .message-time {
            font-size: 0.65rem;
            color: #94a3b8;
            margin-top: 4px;
            padding: 0 12px;
        }

        /* Ввод сообщения */
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
            background: white;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            outline: none;
            font-size: 0.95rem;
        }

        .chat-input:focus {
            border-color: #3b82f6;
        }

        .send-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 28px;
            cursor: pointer;
            font-weight: 600;
        }

        .send-btn:hover {
            background: #2563eb;
        }

        /* Модальное окно для имени */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 24px;
            width: 350px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
        }

        .modal-content button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            cursor: pointer;
            width: 100%;
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
                height: 95vh;
            }
            .sidebar {
                width: 100%;
                max-height: 40%;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // Supabase конфиг
           const URL = 'https://hnkltaebpyqsasljixkg.supabase.co';
    // Внимание: используем реальный publishable ключ из условия (он не секретный для клиента)
    const KEY = 'sb_publishable_ZpJ8sXBpfHiel-ymO1rE3A_NTt2Wp-G';
    const supabase = createClient(URL, KEY);

        let currentUser = null;
        let studyStartTime = null;
        let studyInterval = null;

        // Функции для работы с временем учебы
        function startStudyTimer(userId) {
            if (studyInterval) clearInterval(studyInterval);
            
            studyInterval = setInterval(async () => {
                if (currentUser && currentUser.status === 'Учёба' && studyStartTime) {
                    const elapsed = Math.floor((Date.now() - studyStartTime) / 1000);
                    await supabase
                        .from('profiles')
                        .update({ study_seconds: elapsed })
                        .eq('id', userId);
                    
                    // Обновляем отображение у себя
                    const timerElement = document.getElementById(`timer-${userId}`);
                    if (timerElement) {
                        timerElement.textContent = formatTime(elapsed);
                    }
                }
            }, 1000);
        }

        function formatTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            if (hours > 0) {
                return `${hours}ч ${minutes}м`;
            }
            return `${minutes}м ${secs}с`;
        }

        // Отметка о последней активности (онлайн)
        async function updateOnlineStatus(userId) {
            await supabase
                .from('profiles')
                .update({ last_seen: new Date().toISOString() })
                .eq('id', userId);
        }

        // Периодическое обновление онлайна
        function startOnlinePing(userId) {
            updateOnlineStatus(userId);
            setInterval(() => updateOnlineStatus(userId), 30000);
        }

        // Проверка кто онлайн (был активен в последние 2 минуты)
        function isOnline(lastSeen) {
            if (!lastSeen) return false;
            const last = new Date(lastSeen);
            const now = new Date();
            return (now - last) < 120000; // 2 минуты
        }

        // Отправка сообщения
        async function sendMessage(text) {
            if (!text.trim() || !currentUser) return;
            
            await supabase
                .from('messages')
                .insert({
                    user_id: currentUser.id,
                    username: currentUser.username,
                    message: text,
                    created_at: new Date().toISOString()
                });
        }

        // Загрузка сообщений
        async function loadMessages() {
            const { data: messages, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(100);
            
            if (error) return;
            
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            
            container.innerHTML = messages.map(msg => {
                const isMy = msg.user_id === currentUser?.id;
                const time = new Date(msg.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                
                return `
                    <div class="message ${isMy ? 'my-message' : 'message-other'}">
                        <div class="message-sender">${escapeHtml(msg.username)}</div>
                        <div class="message-bubble">${escapeHtml(msg.message)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
            }).join('');
            
            // Скролл вниз
            container.scrollTop = container.scrollHeight;
        }

        // Загрузка списка пользователей
        async function loadUsers() {
            const { data: users, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username');
            
            if (error) return;
            
            const onlineUsers = users.filter(u => isOnline(u.last_seen));
            const onlineCount = onlineUsers.length;
            
            const container = document.getElementById('usersList');
            const onlineSpan = document.getElementById('onlineCount');
            
            if (onlineSpan) onlineSpan.textContent = `${onlineCount} онлайн`;
            
            if (container) {
                container.innerHTML = users.map(user => {
                    const online = isOnline(user.last_seen);
                    const studyTime = user.study_seconds || 0;
                    const isCurrentUser = user.id === currentUser?.id;
                    
                    return `
                        <div class="user-card ${online ? 'online' : ''}">
                            <div class="user-avatar">
                                ${user.username.charAt(0).toUpperCase()}
                            </div>
                            <div class="user-info">
                                <div class="user-name">
                                    ${escapeHtml(user.username)}
                                    ${online ? '<span class="online-dot"></span>' : '<span class="offline-dot"></span>'}
                                    ${isCurrentUser ? '<span style="font-size: 0.7rem; background: #dbeafe; padding: 2px 8px; border-radius: 12px;">Вы</span>' : ''}
                                </div>
                                <div class="user-status">
                                    ${user.status || 'Нет статуса'}
                                    ${user.status === 'Учёба' ? `<div class="study-timer" id="timer-${user.id}">${formatTime(studyTime)}</div>` : ''}
                                </div>
                            </div>
                            ${!isCurrentUser && user.status === 'Учёба' ? '<div style="font-size: 0.7rem;">📚 учеба</div>' : ''}
                        </div>
                    `;
                }).join('');
            }
            
            // Обновляем таймеры для всех
            users.forEach(user => {
                if (user.status === 'Учёба') {
                    const timerEl = document.getElementById(`timer-${user.id}`);
                    if (timerEl) {
                        timerEl.textContent = formatTime(user.study_seconds || 0);
                    }
                }
            });
        }

        // Изменение статуса
        async function changeStatus(status) {
            if (!currentUser) return;
            
            const updates = { status: status };
            
            if (status === 'Учёба') {
                studyStartTime = Date.now();
                updates.study_seconds = 0;
                startStudyTimer(currentUser.id);
            } else if (status === 'Перерыв' || status === 'Выход') {
                if (studyInterval) clearInterval(studyInterval);
                studyStartTime = null;
            }
            
            await supabase
                .from('profiles')
                .update(updates)
                .eq('id', currentUser.id);
            
            // Обновляем локально
            currentUser.status = status;
            await loadUsers();
        }

        // Инициализация/вход
        async function initUser(username) {
            // Проверяем или создаем пользователя
            const { data: existing } = await supabase
                .from('profiles')
                .select('*')
                .eq('username', username)
                .maybeSingle();
            
            if (existing) {
                currentUser = existing;
                await supabase
                    .from('profiles')
                    .update({ last_seen: new Date().toISOString() })
                    .eq('id', currentUser.id);
            } else {
                const newUser = {
                    id: crypto.randomUUID(),
                    username: username,
                    status: 'Онлайн',
                    study_seconds: 0,
                    last_seen: new Date().toISOString()
                };
                await supabase.from('profiles').insert(newUser);
                currentUser = newUser;
            }
            
            if (currentUser.status === 'Учёба') {
                studyStartTime = Date.now() - (currentUser.study_seconds * 1000);
                startStudyTimer(currentUser.id);
            }
            
            startOnlinePing(currentUser.id);
            renderMainApp();
            loadUsers();
            loadMessages();
            
            // Подписка на изменения в реальном времени
            supabase
                .channel('profiles-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => loadUsers())
                .subscribe();
            
            supabase
                .channel('messages-changes')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadMessages())
                .subscribe();
            
            // Обновление каждые 5 секунд
            setInterval(() => {
                loadUsers();
                if (currentUser?.status === 'Учёба') {
                    updateOnlineStatus(currentUser.id);
                }
            }, 5000);
        }

        // Рендер главного приложения
        function renderMainApp() {
            const root = document.getElementById('root');
            root.innerHTML = `
                <div class="app-container">
                    <!-- Левая панель -->
                    <div class="sidebar">
                        <div class="sidebar-header">
                            <h2>
                                📡 Монитор группы
                                <span class="online-count" id="onlineCount">0 онлайн</span>
                            </h2>
                        </div>
                        <div class="users-list" id="usersList">
                            <div style="text-align: center; padding: 20px;">Загрузка...</div>
                        </div>
                    </div>
                    
                    <!-- Правая панель - Чат -->
                    <div class="chat-area">
                        <div class="chat-header">
                            <h3>💬 Общий чат</h3>
                            <div class="my-controls">
                                <div class="status-buttons" id="statusButtons">
                                    <button class="status-badge" data-status="Учёба">📚 Учёба</button>
                                    <button class="status-badge" data-status="Перерыв">☕ Перерыв</button>
                                    <button class="status-badge" data-status="Выход">🚪 Выход</button>
                                </div>
                                <button class="logout-btn" id="logoutBtn">Завершить сессию</button>
                            </div>
                        </div>
                        
                        <div class="messages-container" id="messagesContainer">
                            <div style="text-align: center; padding: 20px;">Загрузка сообщений...</div>
                        </div>
                        
                        <div class="chat-input-area">
                            <input type="text" class="chat-input" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') window.dispatchEvent(new Event('sendMessage'))">
                            <button class="send-btn" id="sendBtn">Отправить</button>
                        </div>
                    </div>
                </div>
            `;
            
            // Кнопки статусов
            document.querySelectorAll('.status-badge').forEach(btn => {
                btn.addEventListener('click', () => changeStatus(btn.getAttribute('data-status')));
                if (currentUser.status === btn.getAttribute('data-status')) {
                    btn.classList.add('active');
                }
            });
            
            // Отправка сообщения
            const sendBtn = document.getElementById('sendBtn');
            const messageInput = document.getElementById('messageInput');
            
            const send = () => {
                if (messageInput.value.trim()) {
                    sendMessage(messageInput.value);
                    messageInput.value = '';
                }
            };
            
            sendBtn.onclick = send;
            messageInput.onkeypress = (e) => {
                if (e.key === 'Enter') send();
            };
            
            document.getElementById('logoutBtn').onclick = async () => {
                if (studyInterval) clearInterval(studyInterval);
                await supabase.auth?.signOut();
                location.reload();
            };
        }
        
        // Модалка для ввода имени
        function showNameModal() {
            const root = document.getElementById('root');
            root.innerHTML = `
                <div class="modal">
                    <div class="modal-content">
                        <h2>👋 Добро пожаловать!</h2>
                        <p>Введите ваше имя для входа в группу</p>
                        <input type="text" id="usernameInput" placeholder="Ваше имя" maxlength="30">
                        <button id="startBtn">Начать</button>
                    </div>
                </div>
            `;
            
            document.getElementById('startBtn').onclick = () => {
                const name = document.getElementById('usernameInput').value.trim();
                if (name) {
                    initUser(name);
                } else {
                    alert('Введите имя!');
                }
            };
            
            document.getElementById('usernameInput').onkeypress = (e) => {
                if (e.key === 'Enter') document.getElementById('startBtn').click();
            };
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, (m) => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Запуск
        showNameModal();
    </script>
</body>
</html>
